services:
  bot:
    build: .
    env_file: .env
    volumes:
      - ./config:/app/config:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./signals/incoming:/app/signals/incoming
    ports:
      - "${HEALTH_PORT:-8080}:8080"
      - "${ADMIN_API_PORT:-8081}:8081"
    stop_grace_period: 10s
    restart: unless-stopped
