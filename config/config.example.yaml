# Potion Perps Bot — Configuration
# Copy to config.yaml and customize. Secrets go in .env (not here).

# --- Signal input ---
input:
  adapter: simulation              # simulation | cli | file | discord
  signals_dir: signals/incoming/   # file adapter drop zone
  simulation_dir: signals/samples/ # replay directory for simulation adapter
  simulation_delay_sec: 5          # seconds between replayed signals

# --- Hyperliquid exchange ---
# Credentials are in .env (HL_ACCOUNT_ADDRESS, HL_API_WALLET, HL_API_SECRET)
exchange:
  network: testnet                 # testnet | mainnet

# --- Strategy presets ---
# A "strategy" is just 3 settings: TP management, SL management, position sizing.
# Define your own presets here, or use built-ins: runner, conservative, tp2_exit,
# tp3_hold, breakeven_filter, small_runner.
#
# User-defined presets override built-ins with the same name.
strategy_presets:
  my_strategy:                     # your custom preset
    tp_split: [0.5, 0.3, 0.2]     # % of position to close at TP1, TP2, TP3
    move_sl_to_breakeven_after: tp1  # tp1 | tp2 | never
    size_pct: 1.5                  # % of account balance per trade

# Built-in presets (no need to redefine unless you want to override):
#   runner:           tp_split [0.33, 0.33, 0.34], BE after TP1, 2% size
#   conservative:     tp_split [1.0, 0, 0],        no BE move,   2% size
#   tp2_exit:         tp_split [0.5, 0.5, 0],      BE after TP1, 2% size
#   tp3_hold:         tp_split [0, 0, 1.0],         BE after TP1, 2% size
#   breakeven_filter: tp_split [0.33, 0.33, 0.34], BE after TP1, 1.5% size
#   small_runner:     tp_split [0.33, 0.33, 0.34], BE after TP1, 0.5% size

# --- Strategy selection ---
strategy:
  active_preset: runner            # which preset to use (built-in or custom)
  auto_execute: false              # true = execute immediately, false = wait for confirmation
  max_leverage: 20                 # cap leverage regardless of signal
  size_by_risk:                    # override preset size_pct per risk level
    LOW: 4.0
    MEDIUM: 2.0
    HIGH: 1.0

# --- Risk management ---
risk:
  max_open_positions: 10           # max concurrent trades
  max_daily_loss_pct: 10.0         # circuit breaker: stop trading if daily loss exceeds this %
  max_position_size_usd: 500       # absolute max USD per single position
  max_total_exposure_usd: 2000     # max total USD across all open positions combined
  min_order_usd: 10.0              # Hyperliquid minimum order value

# --- State persistence ---
database:
  path: data/trades.db             # SQLite database path

# --- Logging ---
logging:
  level: INFO                      # DEBUG | INFO | WARNING | ERROR
  file: logs/bot.log               # log file path

# --- Discord (Phase 4) ---
# Bot token is in .env (DISCORD_BOT_TOKEN)
discord:
  channel_id: ""                   # Discord channel to monitor
  source_bot_name: "Potion Perps"  # name of the signal bot to listen to
