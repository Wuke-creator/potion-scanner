input:
  adapter: simulation          # simulation | cli | file | discord
  signals_dir: signals/incoming/
  simulation_dir: signals/samples/
  simulation_delay_sec: 5

discord:                        # Phase 4
  bot_token: ${DISCORD_BOT_TOKEN}
  channel_id: ""
  source_bot_name: "Potion Perps"

exchange:
  network: testnet              # testnet | mainnet
  api_key: ${HL_API_KEY}
  api_secret: ${HL_API_SECRET}

strategy:
  active: strategy_1
  tp_split: [0.33, 0.33, 0.34]
  max_leverage: 20
  default_size_pct: 2.0
  size_by_risk:
    LOW: 4.0
    MEDIUM: 2.0
    HIGH: 1.0

risk:
  max_open_positions: 10
  max_daily_loss_pct: 10.0
  max_position_size_usd: 500

logging:
  level: INFO
  file: logs/bot.log
